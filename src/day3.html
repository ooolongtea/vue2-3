<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<link rel="stylesheet" type="text/css" href="css/day3.css">

<body>
    <footer class="footer">

    </footer>
    <main class="page">
        <section class="">
            <div id="app">
                <h3>小黑的礼物清单</h3>
                <table>
                    <tr>
                        <th>名字</th>
                        <th>数量</th>
                    </tr>
                    <tr v-for="(item, index) in list" :key="item.id">
                        <td>{{ item.name }}</td>
                        <td>{{ item.num }}个</td>
                    </tr>
                </table>
                <p>礼物总数：{{totalCount}} 个</p><br>

                <p class="interpretation">computed属性完整写法 get() & set()</p>
                姓：<input type="text" v-model="firstName"> +
                名：<input type="text" v-model="lastName"> =
                <span>{{fullName}}</span><br><br>
                <button @click="changenName">改名卡</button>
            </div>
        </section>
    </main>
</body>
<script src="js/vue.js"></script>
<script>
    const app = new Vue({
        el: '#app',
        data: {
            // 现有的数据
            list: [
                { id: 1, name: '篮球', num: 1 },
                { id: 2, name: '玩具', num: 2 },
                { id: 3, name: '铅笔', num: 5 },
            ],
            firstName: '刘',
            lastName: '备',
        },
        methods: {
            changenName() {
                this.fullName = "any";
            }
        },
        computed: {
            totalCount() {
                let total = this.list.reduce((sum, item) => sum += item.num, 0);
                return total;
            },
            fullName: {
                get() {
                    return this.firstName + this.lastName;
                },
                // 当计算属性背修改赋值时执行set函数
                // 修改的值传递给set函数的形参
                set(value) {
                    console.log(value)
                    this.firstName = value.slice(0, 1);
                    this.lastName = value.slice(1);
                }
            }
        }
    }
    )
</script>

</html>
